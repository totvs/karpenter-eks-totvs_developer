apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-cliente
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal-cliente
  template:
    metadata:
      labels:
        app: portal-cliente
    spec:
      terminationGracePeriodSeconds: 0

      containers:
        - name: portal
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: "500m"
              memory: 256Mi
