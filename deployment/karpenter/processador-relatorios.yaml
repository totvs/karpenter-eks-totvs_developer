apiVersion: apps/v1
kind: Deployment
metadata:
  name: processador-relatorios
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processador-relatorios
  template:
    metadata:
      labels:
        app: processador-relatorios
    spec:
      terminationGracePeriodSeconds: 0

      nodeSelector:
        node-role: batch

      tolerations:
        - key: node-role
          value: batch
          effect: NoSchedule

      containers:
        - name: inflate
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: "2"
              memory: 1Gi
